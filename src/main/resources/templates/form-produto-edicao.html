<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Editar Produto - WMS</title>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">📦 WMS Gestão</a>
    </div>
</nav>

<div class="container bg-white p-5 shadow rounded" style="max-width: 600px;">
    <h2 class="text-secondary mb-4">Editar Cadastro</h2>

    <form th:action="@{/produtos/atualizar}" th:object="${produto}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">SKU (Código Interno)</label>
            <input type="text" th:field="*{sku}" class="form-control" placeholder="Ex: PROD-001" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Nome do Produto</label>
            <input type="text" th:field="*{nome}" class="form-control" placeholder="Ex: Parafuso Sextavado" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea th:field="*{descricao}" class="form-control" rows="3"></textarea>
        </div>

        <div class="d-flex justify-content-between">
            <a href="/produtos/listar" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-warning">Salvar Alterações</button>
        </div>
    </form>
</div>

</body>
</html>

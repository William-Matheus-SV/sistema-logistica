<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Alocação de Mercadoria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #e9ecef; }
    .card-alocacao { max-width: 700px; margin: 40px auto; border: none; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">📦 Sistema WMS</a>
  </div>
</nav>

<div class="container">
  <div class="card card-alocacao shadow-lg">
    <div class="card-header bg-dark text-white text-center">
      <h3 class="mb-0">Alocar Produto no Estoque</h3>
    </div>
    <div class="card-body p-4">
      <form th:action="@{/estoque/confirmar}" th:object="${estoque}" method="post">

        <div class="mb-4">
          <label class="form-label fw-bold">Selecione o Produto:</label>
          <select th:field="*{produto}" class="form-select" required>
            <option value="" selected>Escolha um produto...</option>
            <option th:each="p : ${produtos}"
                    th:value="${p.id}"
                    th:text="${p.sku} + ' - ' + ${p.nome}"></option>
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Vaga de Destino (Endereço):</label>
          <select th:field="*{endereco.id}" class="form-select" required>
            <option value="" disabled selected>Escolha uma vaga livre...</option>
            <option th:each="e : ${enderecosLivres}"
                    th:value="${e.id}"
                    th:text="'Rua: ' + ${e.rua} + ' | Bloco: ' + ${e.bloco}"></option>
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Quantidade a Alocar:</label>
          <input type="number" th:field="*{quantidade}" class="form-control" min="1" required>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary btn-lg">Confirmar Alocação (ACID)</button>
          <a href="/enderecos/mapa" class="btn btn-outline-secondary">Voltar ao Mapa</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>

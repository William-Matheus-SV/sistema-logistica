<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Produtos Cadastrados</title>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Logística System</a>
    </div>
</nav>

<div class="container bg-white p-4 shadow rounded">
    <h2>Produtos no Sistema</h2>
    <table class="table table-striped mt-3">
        <thead class="table-primary">
        <tr>
            <th>SKU</th>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${produtos}">
            <td th:text="${p.sku}">SKU</td>
            <td th:text="${p.nome}">Nome</td>
            <td th:text="${p.descricao}">Descrição</td>

        <td>
            <a th:href="@{/produtos/editar/{id}(id=${p.id})}" class="btn btn-sm btn-warning text-dark">
                ✏️ Editar
            </a>
        </td>
        <td>
            <a th:href="@{/produtos/excluir/{id}(id=${p.id})}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('Tem certeza que deseja excluir este produto? Isso pode afetar o estoque!')">
                🗑️ Excluir
            </a>
        </td>
        </tr>
        </tbody>
    </table>
    <a href="/produtos/novo" class="btn btn-primary">Cadastrar Novo</a>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Mapa do Armazém</title>
    <style>
        .vaga { width: 100px; height: 100px; display: flex; align-items: center;
            justify-content: center; color: white; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand" href="#">📦 WMS Dashboard</a>
        <div class="navbar-nav d-flex flex-row">
            <a class="nav-link px-2" href="/produtos/novo">Entrada</a>
            <a class="nav-link px-2" href="/produtos/listar">Produtos</a>
            <a class="nav-link px-2 active" href="/enderecos/mapa">Mapa</a>
            <a class="nav-link px-2" href="/estoque/alocar">Alocar</a>
            <a class="nav-link px-2" href="/estoque/listar">Inventário</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4 text-center">Status de Ocupação das Vagas</h2>

    <div th:each="rua : ${ruas}" class="mb-5 p-4 bg-white shadow-sm rounded border">
        <h4 class="text-primary border-bottom pb-2">Rua: <span th:text="${rua}">A</span></h4>

        <div th:each="n : ${#numbers.sequence(3, 1, -1)}" class="d-flex align-items-center mb-3">

            <div class="me-3 fw-bold text-muted" style="width: 70px;">Nível <span th:text="${n}">1</span></div>

            <div class="d-flex flex-wrap border-start ps-3">
                <th:block th:each="e : ${enderecos}">
                    <div th:if="${e.rua == rua and e.nivel == n}" class="m-2 text-center">
                        <div class="vaga" th:classappend="${e.disponivel} ? 'bg-success' : 'bg-danger'"
                             style="width: 80px; height: 80px; font-size: 0.9rem;">
                            <span th:text="'Bl: ' + ${e.bloco}">B10</span>
                        </div>
                        <small class="fw-bold d-block mt-1" style="font-size: 0.7rem;"
                               th:classappend="${e.disponivel} ? 'text-success' : 'text-danger'"
                               th:text="${e.disponivel} ? 'LIVRE' : 'OCUPADO'"></small>
                    </div>
                </th:block>
            </div>
        </div>
    </div>
</div>
</body>
</html>
